#
# This file contains configuration flags to customize your site
#

# Name of your site (displayed in the header)
title: Jinyao Nan's Homepage

# Short bio or description (displayed in the header)
description: A modern and responsive academic personal homepage.

# URL of your avatar or profile pic (you can buy your own domain name)
avatar: /images/avatar.jpg

#
# Flags below are optional
#

# Includes an icon in the footer for each username you enter
footer-links:
  dribbble:
  email: "nanjinyao@163.com"
  facebook:
  flickr:
  github: "nanjinyao"
  instagram:
  linkedin:
  pinterest:
  rss: # just type anything here for a working RSS icon
  twitter:
  stackoverflow: # your stackoverflow profile, e.g. "users/50476/bart-kiers"
  youtube: # channel/<your_long_string> or user/<user-name>
  googleplus: # anything in your profile username that comes after plus.google.com/


# Enter your Disqus shortname for enabling Disqus comments, leave blank to disable
disqus:

# Enter your Google Analytics web tracking code (e.g. UA-2110908-2) to activate tracking
google_analytics:

# Your website URL (e.g. http://barryclark.github.io or http://www.barryclark.co)
# Used for Sitemap.xml and your RSS feed
url: "https://nanjinyao.github.io"

# If you're hosting your site at a Project repository on GitHub pages
# (e.g. http://yourusername.github.io/repository-name)
# and NOT your User repository (http://yourusername.github.io)
# then add in the baseurl here, like this: "/repository-name"
baseurl: ""

#
# !! You don't need to change any of the configuration flags below !!
#

permalink: /:title/

# The release of Jekyll Now that you're using
version: v1.2.0

# Jekyll 3 now only supports Kramdown for Markdown
kramdown:
  # Use GitHub flavored markdown, including triple backtick fenced code blocks
  input: GFM
  # Jekyll 3 and GitHub Pages now only support rouge for syntax highlighting
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    # Use existing pygments syntax highlighting css
    css_class: 'highlight'

# Set the Sass partials directory, as we're using @imports
sass:
  style: :expanded # You might prefer to minify using :compressed

# Use the following plug-ins
plugins:
  - jekyll-sitemap # Create a sitemap using the official Jekyll sitemap gem
  - jekyll-feed # Create an Atom feed using the official Jekyll feed gem

# Exclude these files from your production _site
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME

# The following keys are configured specially for the academicpages template
# You can use them in any page layout by calling {{ site.key_name }}
#
# The following keys are used to programmatically generate nav items
# You can override this behavior by creating a _data/navigation.yml file
# To hide a nav item from the menu, just remove its key from navigation_pages
navigation_pages:
  - about.md
  - publications.md
  - talks.md
  - teaching.md
  - portfolio.md
  - blog.md
  - cv.md

# The following keys are used to programmatically generate author metadata
# For example, in about.md, you can use {{ site.author.name }} to get the author name
author:
  name: "Jinyao Nan"
  avatar: "/images/avatar.jpg"
  email: "nanjinyao@163.com"
  github: "nanjinyao"
  linkedin: "" # Leave empty if you don't have one
  google_scholar: "" # Please put your Google Scholar ID here

# The following keys are used to programmatically generate SEO metadata
# You can override this behavior by creating these keys in the front matter of your pages
seo:
  meta_og_title: "Jinyao Nan's Homepage"
  meta_og_type: "website"
  meta_og_url: "https://nanjinyao.github.io"
  meta_og_description: "A modern and responsive academic personal homepage."
  meta_og_image: "/images/preview.png"
  meta_twitter_card: "summary"
  meta_twitter_site: "@your_twitter_handle" # Optional: your Twitter handle
  meta_twitter_creator: "@your_twitter_handle" # Optional: your Twitter handle

# The following keys are used to configure the Favicon
# You can override this behavior by creating a _data/favicon.yml file
favicon:
  path: "/images/favicon-32x32.png"

# The following keys are used to configure the Google Scholar Crawler
# You can override this behavior by creating a _data/scholar.yml file
scholar:
  source: /_data/scholar.yml

# The following keys are used to configure the header
header:
  logo: "/images/logo.png"
  nav_align: "right" # right, left, or center

# The following keys are used to configure the footer
footer:
  show_powered_by: true
